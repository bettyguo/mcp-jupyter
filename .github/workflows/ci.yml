name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint (ruff)
        run: ruff check src tests
      - name: Type check (mypy)
        run: mypy src
      - name: Smoke tests
        run: pytest tests/test_smoke.py -v

  integration-standalone:
    runs-on: ubuntu-latest
    needs: lint-and-smoke
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install with dev + plot + data
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,plot,data]
      - name: Standalone integration tests
        run: pytest tests/ -v -m integration_standalone

  integration-server:
    runs-on: ubuntu-latest
    needs: lint-and-smoke
    services:
      jupyter:
        image: jupyter/scipy-notebook:latest
        ports:
          - 8888:8888
        env:
          JUPYTER_TOKEN: ci-secret-token
        options: >-
          --health-cmd "curl -fsS http://localhost:8888/api?token=ci-secret-token || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    env:
      JUPYTER_TEST_URL: http://localhost:8888
      JUPYTER_TEST_TOKEN: ci-secret-token
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Server integration tests
        run: pytest tests/ -v -m integration_server
